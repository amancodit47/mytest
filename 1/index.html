<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Chart JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">

        <h5>CORE</h5>

        <a href="#">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <hr>

        <h5>INTERFACE</h5>

        <a href="#">
            <i class="bi bi-layout-text-window"></i> Layouts
        </a>

        <a href="#">
            <i class="bi bi-book"></i> Pages
        </a>

        <hr>

        <h5>ADDONS</h5>

        <a href="#">
            <i class="bi bi-bar-chart"></i> Charts
        </a>

        <a href="#">
            <i class="bi bi-table"></i> Tables
        </a>

    </div>


    <!-- Main Content -->
    <div class="main-content">

        <!-- Navbar -->
        <nav class="navbar navbar-dark bg-dark px-3 mb-4 rounded">

            <div class="ms-auto d-flex">

                <input class="form-control me-2" type="search" placeholder="Search">

                <button class="btn btn-primary">
                    <i class="bi bi-search"></i>
                </button>

            </div>

        </nav>

        <!-- Heading -->
        <h1 class="mb-4">Dashboard</h1>

        <!-- Cards -->
        <div class="row g-4">

            <div class="col-md-3">
                <div class="dashboard-card bg-primary">
                    <div class="card-body">
                        <h4>Primary Card</h4>
                    </div>

                    <div class="card-footer">
                        View Details
                    </div>
                </div>
            </div>


            <div class="col-md-3">
                <div class="dashboard-card bg-warning text-dark">
                    <div class="card-body">
                        <h4>Warning Card</h4>
                    </div>

                    <div class="card-footer">
                        View Details
                    </div>
                </div>
            </div>


            <div class="col-md-3">
                <div class="dashboard-card bg-success">
                    <div class="card-body">
                        <h4>Success Card</h4>
                    </div>

                    <div class="card-footer">
                        View Details
                    </div>
                </div>
            </div>


            <div class="col-md-3">
                <div class="dashboard-card bg-danger">
                    <div class="card-body">
                        <h4>Danger Card</h4>
                    </div>

                    <div class="card-footer">
                        View Details
                    </div>
                </div>
            </div>

        </div>


        <!-- Charts -->
        <div class="row mt-4">

            <!-- Bar Chart -->
            <div class="col-md-6">

                <div class="chart-box">

                    <h4>
                        <i class="bi bi-bar-chart-fill"></i>
                        Bar Graph Example
                    </h4>

                    <canvas id="barChart"></canvas>

                </div>

            </div>


            <!-- Area Chart -->
            <div class="col-md-6">

                <div class="chart-box">

                    <h4>
                        <i class="bi bi-bar-chart-fill"></i>
                        Area Chart Example
                    </h4>

                    <canvas id="areaChart"></canvas>

                </div>

            </div>

        </div>

    </div>

    <!-- JS -->
    <script src="script.js"></script>

</body>

</html>
